#cloud-config

package_update: true
package_upgrade: true

packages:
  - nginx

write_files:
  - path: /var/www/html/index.html
    permissions: "0644"
    content: |
      <html>
      <head>
          <title>Terraform Cloud-Init Demo</title>
      </head>
      <body>
          <h1>EC2 Configured Automatically</h1>
          <p>This page was created using cloud-init.</p>
      </body>
      </html>

runcmd:
  - systemctl enable nginx
  - systemctl start nginx

final_message: "Cloud-init completed successfully."
